<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" fill="#f5f0eb"/>
  <!-- Workbench -->
  <rect x="100" y="350" width="600" height="30" fill="#c49a6c" stroke="#b8956a" stroke-width="2"/>
  <rect x="130" y="380" width="20" height="120" fill="#b8956a"/>
  <rect x="650" y="380" width="20" height="120" fill="#b8956a"/>
  <!-- Tools on wall -->
  <rect x="200" y="100" width="8" height="80" fill="#8c8c8c" rx="2"/>
  <rect x="250" y="120" width="8" height="60" fill="#8c8c8c" rx="2"/>
  <rect x="300" y="90" width="8" height="90" fill="#8c8c8c" rx="2"/>
  <!-- Planter in progress -->
  <rect x="350" y="280" width="200" height="70" rx="4" fill="#d4a574" stroke="#b8956a" stroke-width="2"/>
  <!-- Wood shavings -->
  <ellipse cx="420" cy="345" rx="40" ry="6" fill="#e0c9a6" opacity="0.5"/>
  <text x="400" y="540" font-family="sans-serif" font-size="20" fill="#9c8b7a" text-anchor="middle">The Workshop</text>
</svg>
