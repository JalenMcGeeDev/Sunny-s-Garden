<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" fill="#f5f0eb"/>
  <!-- Top tier -->
  <rect x="150" y="150" width="500" height="120" rx="8" fill="#d4a574" stroke="#b8956a" stroke-width="3"/>
  <rect x="160" y="160" width="480" height="100" rx="4" fill="#8B6914" opacity="0.2"/>
  <!-- Corner posts -->
  <rect x="150" y="150" width="20" height="280" fill="#c49a6c" stroke="#b8956a" stroke-width="2"/>
  <rect x="630" y="150" width="20" height="280" fill="#c49a6c" stroke="#b8956a" stroke-width="2"/>
  <!-- Bottom tier -->
  <rect x="150" y="310" width="500" height="120" rx="8" fill="#d4a574" stroke="#b8956a" stroke-width="3"/>
  <rect x="160" y="320" width="480" height="100" rx="4" fill="#8B6914" opacity="0.2"/>
  <!-- Plants top -->
  <circle cx="240" cy="140" r="25" fill="#4a7c59"/>
  <circle cx="330" cy="130" r="30" fill="#5a8c69"/>
  <circle cx="420" cy="135" r="28" fill="#3d6b4a"/>
  <circle cx="510" cy="128" r="32" fill="#4a7c59"/>
  <circle cx="580" cy="138" r="22" fill="#6a9c79"/>
  <!-- Plants bottom -->
  <circle cx="250" cy="300" r="22" fill="#5a8c69"/>
  <circle cx="340" cy="295" r="26" fill="#3d6b4a"/>
  <circle cx="430" cy="298" r="24" fill="#4a7c59"/>
  <circle cx="520" cy="292" r="28" fill="#5a8c69"/>
  <text x="400" y="510" font-family="sans-serif" font-size="22" fill="#9c8b7a" text-anchor="middle">Double Sunny — Two-Tier Planter</text>
</svg>
